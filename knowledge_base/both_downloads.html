  <button onclick="downloadMd()" style="font-size: 14px; padding: 8px 20px; text-align: left;">Download guest_comm_tone_guide.md</button>
  <button onclick="downloadDocx()" id="docxBtn" style="font-size: 14px; padding: 8px 20px; text-align: left;">Download guest_comm_tone_guide.docx</button>

<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script>
function downloadMd() {
  const content = `# Guest communication tone guide
**Far Longing Getaways & Mars Hill Getaways — STR guest messaging**
*Draft v1 — language patterns to be refined once past guest messages are added to knowledge base*

---

## Core principles

1. Be genuinely warm — write like you're welcoming friends to your place, not processing a transaction.
2. Keep it concise and helpful. Get to the answer quickly, without unnecessary filler.
3. Let the cozy, rustic character of the properties come through naturally in your language — nothing overly polished or corporate.
4. Build a relationship. Every message is a small opportunity to make guests feel at home and want to come back.
5. Add a small personal touch to simple answers — a brief friendly line before or after — but don't overdo it.

---

## Scenario examples

### Wi-Fi password
**Guest asks:** "Hey, what's the Wi-Fi password?"

> Hey there! The Wi-Fi network is [NETWORK NAME] and the password is [PASSWORD]. Let me know if you have any trouble connecting — happy to help!

---

### Check-in confirmation
**Guest messages after booking to confirm check-in details.**

> So excited to have you! Your check-in is at [TIME] — the lockbox code is [CODE] and it's right by the front door. Settle in and make yourself at home. Can't wait for you to experience this place.

---

### Local recommendation
**Guest asks:** "Any recommendations for places to eat nearby?"

> We love sending folks to [RESTAURANT NAME] — great [food type] and a really local feel. It's about [X] minutes from you.

---

### Property/amenity question
**Guest asks:** "How do I get the hot tub going?"

> Great choice! The hot tub is on the back porch — just flip the switch on the panel and give it about 20 minutes to heat up. Enjoy it!

---

### Early check-in request
**Guest asks if they can check in before the listed time.**

> Love the enthusiasm! I'll check with our team and see what we can do — I'll get back to you as soon as I know. Fingers crossed we can make it work!

---

## Notes

- **Complaint handling** and difficult guest situations are covered in a separate document. This guide covers standard inquiries, check-in messaging, and general property questions only.
- **Next step:** Share past guest message examples to refine language patterns and make this voice authentically yours.
`;
  const blob = new Blob([content], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'guest_comm_tone_guide.md';
  a.click();
  URL.revokeObjectURL(url);
}

async function downloadDocx() {
  const btn = document.getElementById('docxBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Building .docx...';
  try {
    const { Document, Packer, Paragraph, TextRun, HeadingLevel, BorderStyle } = docx;
    const divider = new Paragraph({ border: { bottom: { color: "999999", space: 1, style: BorderStyle.SINGLE, size: 6 } }, spacing: { after: 200 } });
    const scenarioLabel = (text) => new Paragraph({ children: [new TextRun({ text, bold: true, size: 24, color: "444444" })], spacing: { before: 320, after: 80 } });
    const guestLine = (text) => new Paragraph({ children: [new TextRun({ text: "Guest: ", italics: true, size: 22, color: "666666" }), new TextRun({ text, italics: true, size: 22, color: "666666" })], spacing: { after: 80 } });
    const responsePara = (text) => new Paragraph({ children: [new TextRun({ text, size: 22 })], indent: { left: 720 }, border: { left: { color: "AAAAAA", space: 8, style: BorderStyle.SINGLE, size: 12 } }, spacing: { before: 80, after: 200 } });
    const doc = new Document({
      styles: { default: { document: { run: { font: "Calibri", size: 24 } } } },
      sections: [{ properties: { page: { margin: { top: 1080, bottom: 1080, left: 1080, right: 1080 } } }, children: [
        new Paragraph({ text: "Guest communication tone guide", heading: HeadingLevel.TITLE, spacing: { after: 120 } }),
        new Paragraph({ children: [new TextRun({ text: "Far Longing Getaways & Mars Hill Getaways — STR guest messaging", bold: true, size: 24 })], spacing: { after: 80 } }),
        new Paragraph({ children: [new TextRun({ text: "Draft v1 — language patterns to be refined once past guest messages are added to knowledge base", italics: true, size: 22, color: "666666" })], spacing: { after: 400 } }),
        divider,
        new Paragraph({ text: "Core principles", heading: HeadingLevel.HEADING_1, spacing: { before: 240, after: 200 } }),
        ...["1. Be genuinely warm — write like you're welcoming friends to your place, not processing a transaction.",
            "2. Keep it concise and helpful. Get to the answer quickly, without unnecessary filler.",
            "3. Let the cozy, rustic character of the properties come through naturally in your language — nothing overly polished or corporate.",
            "4. Build a relationship. Every message is a small opportunity to make guests feel at home and want to come back.",
            "5. Add a small personal touch to simple answers — a brief friendly line before or after — but don't overdo it."
        ].map(p => new Paragraph({ children: [new TextRun({ text: p, size: 22 })], spacing: { after: 160 } })),
        divider,
        new Paragraph({ text: "Scenario examples", heading: HeadingLevel.HEADING_1, spacing: { before: 240, after: 120 } }),
        new Paragraph({ children: [new TextRun({ text: "Placeholder examples — to be refined once past guest messages are added to the knowledge base.", italics: true, size: 22, color: "666666" })], spacing: { after: 280 } }),
        scenarioLabel("Wi-Fi password"), guestLine('"Hey, what\'s the Wi-Fi password?"'), responsePara("Hey there! The Wi-Fi network is [NETWORK NAME] and the password is [PASSWORD]. Let me know if you have any trouble connecting — happy to help!"),
        scenarioLabel("Check-in confirmation"), guestLine("Guest messages after booking to confirm check-in details."), responsePara("So excited to have you! Your check-in is at [TIME] — the lockbox code is [CODE] and it's right by the front door. Settle in and make yourself at home. Can't wait for you to experience this place."),
        scenarioLabel("Local recommendation"), guestLine('"Any recommendations for places to eat nearby?"'), responsePara("We love sending folks to [RESTAURANT NAME] — great [food type] and a really local feel. It's about [X] minutes from you."),
        scenarioLabel("Property/amenity question"), guestLine('"How do I get the hot tub going?"'), responsePara("Great choice! The hot tub is on the back porch — just flip the switch on the panel and give it about 20 minutes to heat up. Enjoy it!"),
        scenarioLabel("Early check-in request"), guestLine("Guest asks if they can check in before the listed time."), responsePara("Love the enthusiasm! I'll check with our team and see what we can do — I'll get back to you as soon as I know. Fingers crossed we can make it work!"),
        divider,
        new Paragraph({ text: "Notes", heading: HeadingLevel.HEADING_1, spacing: { before: 240, after: 160 } }),
        new Paragraph({ children: [new TextRun({ text: "Complaint handling", bold: true, size: 22 }), new TextRun({ text: " and difficult guest situations are covered in a separate document. This guide covers standard inquiries, check-in messaging, and general property questions only.", size: 22 })], spacing: { after: 160 } }),
        new Paragraph({ children: [new TextRun({ text: "Next step: ", bold: true, size: 22 }), new TextRun({ text: "Share past guest message examples to refine language patterns and make this voice authentically yours.", size: 22 })], spacing: { after: 160 } }),
      ]}]
    });
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'guest_comm_tone_guide.docx';
    a.click();
    URL.revokeObjectURL(url);
    status.textContent = 'Downloaded!';
    btn.disabled = false;
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    btn.disabled = false;
  }
}
</script>
